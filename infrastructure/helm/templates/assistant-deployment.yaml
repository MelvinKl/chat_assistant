apiVersion: apps/v1
kind: Deployment
metadata:
  name: assistant
  labels:
    app: assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: assistant
  template:
    metadata:
      labels:
        app: assistant
spec:
  {{- if and .Values.assistant.securityContext.enabled (not .Values.assistant.debug) }}
  securityContext:
    runAsNonRoot: {{ .Values.assistant.securityContext.runAsNonRoot }}
    runAsUser: {{ .Values.assistant.securityContext.runAsUser }}
    runAsGroup: {{ .Values.assistant.securityContext.runAsGroup }}
    fsGroup: {{ .Values.assistant.securityContext.fsGroup }}
    capabilities:
      drop:
        {{- toYaml .Values.assistant.securityContext.capabilities.drop | nindent 8 }}
    allowPrivilegeEscalation: {{ .Values.assistant.securityContext.allowPrivilegeEscalation }}
    readOnlyRootFilesystem: {{ .Values.assistant.securityContext.readOnlyRootFilesystem }}
  {{- end }}
  imagePullSecrets:
    - name: "pull-secret"
  volumes: 
    - name: mcp-config-volume
      configMap:
        name: assistant-mcp-cm
    - name: subagents-config-volume
      configMap:
        name: assistant-subagents-cm
      containers:
      - name: assistant
        imagePullPolicy: Always
        volumeMounts:
        - name: mcp-config-volume
          mountPath: /config/mcp
        - name: subagents-config-volume
          mountPath: /config/subagents
        image: ghcr.io/melvinkl/chat_assistant/assistant:latest
        envFrom:
          - configMapRef:
              name: assistant-cm
          - secretRef:
              name: assistant-secret
        ports:
        - containerPort: 8080
        command:
          - "uv"
          - "run"
        args:
          {{- if .Values.assistant.debug }}
          {{- range $arg :=  .Values.assistant.debugArgs }}
          - {{ $arg | quote -}}
          {{ end }}
          {{- else }}
          {{- range $arg :=  .Values.assistant.args }}
          - {{ $arg | quote -}}
          {{ end }}
          {{- end }}
---
{{- include "egressNetworkPolicy" (dict "enabled" .Values.assistant.egress.enabled "allowedHosts" .Values.assistant.egress.allowedHosts "chartName" "assistant" "podSelectorLabels" (dict "app" "assistant")) }}