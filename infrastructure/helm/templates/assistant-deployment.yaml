apiVersion: apps/v1
kind: Deployment
metadata:
  name: assistant
  labels:
    app: assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: assistant
  template:
    metadata:
      labels:
        app: assistant
    spec:
      imagePullSecrets:
      - name: "pull-secret"
      volumes: 
      - name: mcp-config-volume
        configMap:
          name: assistant-mcp-cm
      - name: subagents-config-volume
        configMap:
          name: assistant-subagents-cm
      containers:
      - name: assistant
        imagePullPolicy: Always
        volumeMounts:
        - name: mcp-config-volume
          mountPath: /config/mcp
        - name: subagents-config-volume
          mountPath: /config/subagents
        image: ghcr.io/melvinkl/chat_assistant/assistant:latest
        envFrom:
          - configMapRef:
              name: assistant-cm
          - secretRef:
              name: assistant-secret
        ports:
        - containerPort: 8080
        command:
          - "uv"
          - "run"
        args:
          {{- if .Values.assistant.debug }}
          {{- range $arg :=  .Values.assistant.debugArgs }}
          - {{ $arg | quote -}}
          {{ end }}
          {{- else }}
          {{- range $arg :=  .Values.assistant.args }}
          - {{ $arg | quote -}}
          {{ end }}
          {{- end }}
---
{{- if .Values.assistant.egress.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: assistant-egress
  labels:
    app: assistant
spec:
  podSelector:
    matchLabels:
      app: assistant
  policyTypes:
  - Egress
  egress:
  {{- if .Values.assistant.egress.allowedHosts }}
  {{- range $host := .Values.assistant.egress.allowedHosts }}
  - to:
    - ipBlock:
        cidr: {{ $host }}
  {{- end }}
  {{- else }}
  - {}
  {{- end }}
{{- end }}