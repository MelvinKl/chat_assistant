{{- if .Values.assistant.egress.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "assistant.fullname" . }}-egress
  labels:
    {{- include "assistant.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: assistant
  policyTypes:
  - Egress
  egress:
  {{- range .Values.assistant.egress.rules }}
  - {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}