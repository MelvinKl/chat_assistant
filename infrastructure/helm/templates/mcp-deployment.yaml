{{- $debug := .Values.assistant.debug }}
{{- range $server :=  .Values.mcpServers.deployments }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $server.name }}
  labels:
    app: {{ $server.name }}
spec:
  {{- if and $server.securityContext.enabled (not $debug) }}
  securityContext:
    runAsNonRoot: {{ $server.securityContext.runAsNonRoot }}
    runAsUser: {{ $server.securityContext.runAsUser }}
    runAsGroup: {{ $server.securityContext.runAsGroup }}
    fsGroup: {{ $server.securityContext.fsGroup }}
    capabilities:
      drop:
        {{- toYaml $server.securityContext.capabilities.drop | nindent 6 }}
    allowPrivilegeEscalation: {{ $server.securityContext.allowPrivilegeEscalation }}
    readOnlyRootFilesystem: {{ $server.securityContext.readOnlyRootFilesystem }}
  {{- end }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ $server.name }}
  template:
    metadata:
      labels:
        app: {{ $server.name }}
    spec:
      imagePullSecrets:
      - name: "pull-secret"
      containers:
      - name: {{ $server.name }}
        imagePullPolicy: Always
        {{- if $server.command }}
        command: {{ $server.command | toJson }}
        {{- end }}
        envFrom:
        - configMapRef:
            name: {{ $server.name }}
        - secretRef:
            name: {{ $server.name }}     
        image:  {{ $server.image }}
        ports:
        - containerPort: {{ $server.port }}
{{- if $server.egress.enabled }}
---
{{- include "egressNetworkPolicy" (dict "enabled" $server.egress.enabled "allowedHosts" $server.egress.allowedHosts "chartName" $server.name "podSelectorLabels" (dict "app" $server.name)) | nindent 0 }}
{{- end }}
{{ end }}