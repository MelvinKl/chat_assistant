# NetworkPolicy applies to mcp-server pods via `component: mcp-server` label
# Conditional rendering on `.Values.mcpServers.egress.enabled`
# Creates one policy per MCP server deployment (iterates over `.Values.mcpServers.deployments`)
# Follows Kubernetes v1 NetworkPolicy API
{{- if .Values.mcpServers.egress.enabled }}
{{- range $.Values.mcpServers.deployments }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chat-assistant.fullname" $ }}-mcp-{{ .name }}-egress
  labels:
    {{- include "assistant.labels" $ | nindent 4 }}
spec:
   podSelector:
     matchLabels:
       app.kubernetes.io/name: {{ include "chat-assistant.name" $ }}
       component: mcp-server
  policyTypes:
  - Egress
  egress:
  {{- range $.Values.mcpServers.egress.rules }}
  - {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}