      port: 8080
      image: ghcr.io/melvinkl/mcp-weather/server:latest
      config: {}
      command:
        - "uv"
        - "run"
        - "python"
        - "src/main.py"
      secrets:
        TRANSPORT: sse
  servers:
    - name: weather
      url: "http://weather:8080/sse"
      command: ""
      env: ""
      transport: "sse"
      args: []
